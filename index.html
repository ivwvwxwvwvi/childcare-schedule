<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>育児タイムスケジュール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap');
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background-color: #f7faf9;
    color: #333;
    padding: 16px 8px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    -webkit-tap-highlight-color: transparent; 
  }
  .layout-container {
    display: flex;
    width: 100%;
    max-width: 700px;
    gap: 16px;
    align-items: flex-start;
  }
  .sidebar {
    width: 220px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    padding: 12px;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    font-size: 14px; font-weight: 700; color: #444; margin-bottom: 12px;
  }
  .pattern-list { list-style: none; padding: 0; margin-bottom: 16px; }
  .pattern-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 8px; border-radius: 6px; cursor: pointer; margin-bottom: 4px;
    font-size: 13px; font-weight: 700; color: #555;
    transition: background 0.2s;
  }
  .pattern-item:hover { background: #f5f5f5; }
  .pattern-item.active { background: #e1f5fe; color: #0288d1; }
  .pattern-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pattern-actions { display: flex; gap: 4px; }
  .pattern-memo {
    width: 100%; min-height: 50px; padding: 8px 12px; margin-bottom: 12px;
    border: 1px solid #ddd; border-radius: 6px; background: #fdfdfd;
    font-size: 13px; color: #555; resize: vertical; box-sizing: border-box;
    font-family: inherit; line-height: 1.4;
  }
  .pattern-memo:focus { outline: none; border-color: #90caf9; background: #fff; }
  .icon-btn {
    background: none; border: none; cursor: pointer; color: #aaa;
    font-size: 12px; padding: 4px;
  }
  .icon-btn:hover { color: #555; }
  .add-pattern-btn {
    background: #f0f0f0; border: none; padding: 10px; border-radius: 6px;
    font-weight: 700; cursor: pointer; color: #555; width: 100%;
    transition: background 0.2s;
  }
  .add-pattern-btn:hover { background: #e0e0e0; }

  @media (max-width: 600px) {
    .layout-container { flex-direction: column; }
    .sidebar { width: 100%; }
  }

  .app-container {
    background: #fff;
    width: 100%;
    max-width: 412px;
    flex: 1;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    overflow: hidden;
    padding-bottom: 20px;
  }
  .header {
    background: #fff;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #f0f0f0;
  }
  .header-left h1 { font-size: 16px; color: #444; font-weight: 700; margin-bottom: 4px; }
  .header-left p { font-size: 10px; color: #666; background: #f0f4f2; padding: 2px 6px; border-radius: 6px; display: inline-block;}
  .settings-btn {
    background: #455a64; color: #fff; border: none; padding: 6px 10px;
    border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer;
  }
  
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th {
    padding: 6px 0; font-size: 11px; color: #777;
    border-bottom: 1px solid #eee; background: #fafafa; font-weight: 700;
  }
  td {
    border-bottom: 1px solid #f2f2f2; border-right: 1px solid #fbfbfb;
    height: 36px; padding: 0; /* paddingを0にしてブロックを画面いっぱいに */
    text-align: center; vertical-align: middle; font-size: 11px; cursor: pointer;
  }
  td.no-border { border-bottom: none !important; }
  td:last-child { border-right: none; }
  
  .col-time { width: 18%; font-weight: 700; color: #555; background: #fafafa; position: relative;}
  .col-mom { width: 41%; position: relative; }
  .col-dad { width: 41%; position: relative; }

  .merged-text {
    position: absolute;
    top: 0; left: 0; width: 100%;
    display: flex; flex-direction: row; align-items: center; justify-content: center;
    padding: 0 2px; gap: 2px;
    pointer-events: none;
    z-index: 10;
  }

  /* 暗室モード（行全体） */
  .dark-row td { background-color: #757575; color: #f5f5f5; border-bottom: 1px solid #9e9e9e;}
  .dark-row td.no-border { border-bottom: none !important; }
  .dark-row td.col-time { background-color: #616161; color: #e0e0e0; }

  /* タスクブロックのデザイン */
  .task-container {
    width: 100%; height: 100%; display: flex; flex-direction: row; 
    align-items: center; justify-content: center; padding: 2px; gap: 2px;
  }
  .task-container.cont-top { padding-top: 0; }
  .task-container.cont-bottom { padding-bottom: 0; }
  
  .task-block {
    flex: 1; min-width: 0; height: 100%; display: flex; align-items: center; justify-content: center;
    border-radius: 6px; font-size: 11px; font-weight: 700; gap: 4px; flex-wrap: wrap;
  }
  
  /* 連続ブロックの接合部（角丸と余白を消して繋げる） */
  .task-block.cont-top { border-top-left-radius: 0; border-top-right-radius: 0; }
  .task-block.cont-bottom { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }

  /* ママ・パパ・睡眠の色分け */
  .bg-mom { background-color: #ffe3e8; color: #c2185b; }
  .bg-dad { background-color: #e1f5fe; color: #0288d1; }
  .bg-sleep { background-color: #eceff1; color: #607d8b; }
  .bg-baby { background-color: #fff3e0; color: #e65100; }
  
  /* 暗室モード中の色調整 */
  .dark-row .bg-mom { background-color: #b97486; color: #fff; }
  .dark-row .bg-dad { background-color: #6592b0; color: #fff; }
  .dark-row .bg-sleep { background-color: #888888; color: #fff; }
  .dark-row .bg-baby { background-color: #c48c5a; color: #fff; }

  .icon-only { font-size: 14px; line-height: 1; }
  .text-badge { padding: 0 4px; }

  /* モーダル共通 */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: flex-end;
    z-index: 100;
  }
  .modal-content {
    background: #fff; width: 100%; max-width: 412px; border-radius: 16px 16px 0 0;
    padding: 20px; text-align: center; box-shadow: 0 -4px 16px rgba(0,0,0,0.1);
    animation: slideUp 0.2s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: #555; }
  
  /* タスク選択モーダル */
  .group-title { font-size: 13px; font-weight: 700; color: #666; margin: 16px 0 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
  .group-title:first-child { margin-top: 0; }
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .task-btn {
    padding: 12px 4px; border: 2px solid #eee; border-radius: 8px; font-size: 12px; 
    font-weight: 700; background: #fff; cursor: pointer; color: #777; transition: 0.1s;
  }
  .task-btn.active.mom-active { background: #ffe3e8; border-color: #ffb3c6; color: #c2185b; }
  .task-btn.active.dad-active { background: #e1f5fe; border-color: #81d4fa; color: #0288d1; }
  .action-btns { display: flex; gap: 8px; }
  .clear-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #f5f5f5; color: #777; font-weight: 700; }
  .close-btn { flex: 2; padding: 12px; border: none; border-radius: 8px; background: #333; color: #fff; font-weight: 700; }

  /* 設定モーダル */
  .setting-row { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 20px; }
  .setting-row select { padding: 8px; font-size: 14px; border-radius: 6px; border: 1px solid #ccc; }
</style>
</head>
<body>
<div class="layout-container">
  <!-- サイドバー -->
  <div class="sidebar">
    <div class="sidebar-header">📅 パターン一覧</div>
    <ul class="pattern-list" id="pattern-list">
      <!-- JSで生成 -->
    </ul>
    <button class="add-pattern-btn" onclick="addPattern()">+ 新規追加</button>
  </div>

  <!-- メイン画面 -->
  <div class="app-container">
    <div class="header">
      <div class="header-left">
        <h1 id="app-title">育児スケジュール</h1>
        <p id="status-text">🔴 接続中...</p>
    </div>
    <button class="settings-btn" onclick="openSettings()">🌙 暗室設定</button>
  </div>
  <textarea id="pattern-memo" class="pattern-memo" placeholder="このスケジュールのメモ・補足事項をここに入力..."></textarea>
  <table>
    <thead>
      <tr>
        <th class="col-time">時間</th>
        <th class="col-mom">ママ</th>
        <th class="col-dad">パパ</th>
      </tr>
    </thead>
    <tbody id="schedule-body">
      <!-- JSで生成 -->
    </tbody>
  </table>
  </div>
</div>

<!-- タスク選択モーダル -->
<div class="modal-overlay" id="task-modal">
  <div class="modal-content">
    <div class="modal-title" id="modal-title">タスクを選択 (複数可)</div>
    <div id="modal-body-container" style="text-align: left; margin-bottom: 16px;"></div>
    <div class="action-btns">
      <button class="clear-btn" onclick="clearTask()">空にする</button>
      <button class="close-btn" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- 設定モーダル -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal-content">
    <div class="modal-title">🌙 暗室にする時間帯</div>
    <div class="setting-row">
      <select id="dark-start"></select>
      <span>〜</span>
      <select id="dark-end"></select>
    </div>
    <button class="close-btn" style="width:100%" onclick="saveSettings()">保存して閉じる</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // Firebase設定
  const firebaseConfig = {
    apiKey: "AIzaSyB_LrMdc1wNheY3cgU1jocn9FwrMAFwpLw",
    authDomain: "childcare-schedule.firebaseapp.com",
    databaseURL: "https://childcare-schedule-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "childcare-schedule",
    storageBucket: "childcare-schedule.firebasestorage.app",
    messagingSenderId: "941657534679",
    appId: "1:941657534679:web:18c7fadb28320224a94092"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  
  // 初期データ構造（スリム化）
  const defaultSchedule = {
    "00": { mom: "", dad: "寝る" }, "01": { mom: "母乳,おむつ", dad: "寝る" },
    "02": { mom: "", dad: "寝る" }, "03": { mom: "", dad: "寝る" },
    "04": { mom: "母乳,おむつ", dad: "寝る" }, "05": { mom: "", dad: "寝る" },
    "06": { mom: "", dad: "起床" }, "07": { mom: "ごはん", dad: "おむつ" },
    "08": { mom: "", dad: "" }, "09": { mom: "", dad: "" },
    "10": { mom: "おむつ", dad: "寝る" }, "11": { mom: "", dad: "寝る" },
    "12": { mom: "ごはん", dad: "寝る" }, "13": { mom: "離乳食,おむつ", dad: "寝る" },
    "14": { mom: "", dad: "寝る" }, "15": { mom: "", dad: "寝る" },
    "16": { mom: "ミルク,おむつ", dad: "" }, "17": { mom: "ごはん", dad: "" },
    "18": { mom: "", dad: "お風呂_baby" }, "19": { mom: "母乳", dad: "おむつ" },
    "20": { mom: "", dad: "" }, "21": { mom: "寝る", dad: "" },
    "22": { mom: "寝る", dad: "ミルク,おむつ" }, "23": { mom: "寝る", dad: "" }
  };
  const defaultSettings = { darkStart: 19, darkEnd: 6 };

  let patternsData = {};
  let currentPatternId = null;
  let currentData = {};
  let currentSettings = {};

  const tbody = document.getElementById('schedule-body');
  const statusText = document.getElementById('status-text');
  const patternList = document.getElementById('pattern-list');
  const appTitle = document.getElementById('app-title');

  // データ同期
  onValue(ref(db, '/'), (snapshot) => {
    let data = snapshot.val() || {};
    
    // データ構造のマイグレーション・初期化
    if (!data.patterns) {
      const defaultId = 'pattern_' + Date.now();
      const initialPatterns = {
        [defaultId]: {
          name: "基本スケジュール",
          schedule: data.schedule || defaultSchedule
        }
      };
      // 古い/scheduleデータがあれば移行し、patternsをセット
      set(ref(db, 'patterns'), initialPatterns);
      if (data.settings) set(ref(db, 'settings'), data.settings);
      else set(ref(db, 'settings'), defaultSettings);
      return; 
    }

    patternsData = data.patterns;
    currentSettings = data.settings || defaultSettings;
    
    // ごはん・お風呂のマイグレーション
    Object.keys(patternsData).forEach(pId => {
      let sched = patternsData[pId].schedule;
      if (sched) {
        let fixTask = (str) => {
          if (!str) return str;
          return str.split(',').map(t => {
            if (["朝食", "昼食", "夕食", "夜ご飯"].includes(t)) return "ごはん";
            if (t === "お風呂") return "お風呂_baby";
            return t;
          }).join(',');
        };
        Object.keys(sched).forEach(h => {
          if (sched[h].mom) sched[h].mom = fixTask(sched[h].mom);
          if (sched[h].dad) sched[h].dad = fixTask(sched[h].dad);
        });
      }
    });

    // 選択中のパターンがないか、削除された場合は最初を選択
    if (!currentPatternId || !patternsData[currentPatternId]) {
      currentPatternId = Object.keys(patternsData)[0]; 
    }

    currentData = patternsData[currentPatternId].schedule || defaultSchedule;
    appTitle.innerText = patternsData[currentPatternId].name;
    const memoEl = document.getElementById('pattern-memo');
    if (document.activeElement !== memoEl) {
      memoEl.value = patternsData[currentPatternId].memo || "";
    }
    
    renderSidebar();
    renderTable();
    
    statusText.innerHTML = "🟢 同期済み";
    setTimeout(() => { statusText.style.background = "transparent"; statusText.innerHTML = ""; }, 2000);
  });

  window.renderSidebar = function() {
    patternList.innerHTML = "";
    Object.keys(patternsData).forEach(id => {
      const pattern = patternsData[id];
      const li = document.createElement('li');
      li.className = `pattern-item ${id === currentPatternId ? 'active' : ''}`;
      li.innerHTML = `
        <span class="pattern-name" onclick="selectPattern('${id}')">${pattern.name}</span>
        <div class="pattern-actions">
          <button class="icon-btn" onclick="editPatternName('${id}')">✏️</button>
          <button class="icon-btn" onclick="deletePattern('${id}')">🗑️</button>
        </div>
      `;
      patternList.appendChild(li);
    });
  }

  window.selectPattern = function(id) {
    currentPatternId = id;
    currentData = patternsData[id].schedule || defaultSchedule;
    appTitle.innerText = patternsData[id].name;
    document.getElementById('pattern-memo').value = patternsData[id].memo || "";
    renderSidebar();
    renderTable();
  };

  window.editPatternName = function(id) {
    const newName = prompt("スケジュールの名前を入力してください", patternsData[id].name);
    if (newName && newName.trim() !== "") {
      update(ref(db, `patterns/${id}`), { name: newName.trim() });
    }
  };

  window.addPattern = function() {
    const newName = prompt("新しいスケジュールの名前を入力してください", "新スケジュール");
    if (newName && newName.trim() !== "") {
      const newId = 'pattern_' + Date.now();
      update(ref(db, `patterns/${newId}`), {
        name: newName.trim(),
        schedule: defaultSchedule
      });
      currentPatternId = newId;
    }
  };

  window.deletePattern = function(id) {
    if (Object.keys(patternsData).length <= 1) {
      alert("最後のスケジュールは削除できません。");
      return;
    }
    if (confirm(`スケジュール「${patternsData[id].name}」を削除してもよろしいですか？`)) {
      set(ref(db, `patterns/${id}`), null);
      if (currentPatternId === id) {
        currentPatternId = null; // 次の同期で別のパターンが自動選択されます
      }
    }
  };

  // 暗室判定ロジック
  function isDarkHour(h) {
    let s = parseInt(currentSettings.darkStart);
    let e = parseInt(currentSettings.darkEnd);
    if (s === e) return h === s;
    if (s < e) return h >= s && h < e;
    return h >= s || h < e;
  }

  // テーブル描画
  function renderTable() {
    tbody.innerHTML = "";
    for (let h = 0; h < 24; h++) {
      let hStr = h.toString().padStart(2, '0');
      let rowData = currentData[hStr] || { mom: "", dad: "" };
      let tr = document.createElement('tr');
      
      if (isDarkHour(h)) tr.className = "dark-row";

      // 連続ブロック判定（前の時間、次の時間とタスクが完全一致するか）
      let prevMom = h > 0 ? (currentData[(h-1).toString().padStart(2, '0')]?.mom || "") : "";
      let nextMom = h < 23 ? (currentData[(h+1).toString().padStart(2, '0')]?.mom || "") : "";
      let prevDad = h > 0 ? (currentData[(h-1).toString().padStart(2, '0')]?.dad || "") : "";
      let nextDad = h < 23 ? (currentData[(h+1).toString().padStart(2, '0')]?.dad || "") : "";

      let momNoBorder = (rowData.mom !== "" && rowData.mom === nextMom) ? "no-border" : "";
      let dadNoBorder = (rowData.dad !== "" && rowData.dad === nextDad) ? "no-border" : "";

      // 結合スパンの計算（最初のブロックの場合のみ、何時間連続するか数える）
      let momSpan = 1;
      if (rowData.mom !== "" && rowData.mom !== prevMom) {
        for(let nextH = h + 1; nextH < 24; nextH++) {
          if ((currentData[nextH.toString().padStart(2, '0')]?.mom || "") === rowData.mom) momSpan++;
          else break;
        }
      }

      let dadSpan = 1;
      if (rowData.dad !== "" && rowData.dad !== prevDad) {
        for(let nextH = h + 1; nextH < 24; nextH++) {
          if ((currentData[nextH.toString().padStart(2, '0')]?.dad || "") === rowData.dad) dadSpan++;
          else break;
        }
      }

      tr.innerHTML = `
        <td class="col-time">${hStr}:00</td>
        <td class="col-mom ${momNoBorder}" onclick="openModal('${hStr}', 'mom')">
          ${renderBlock(rowData.mom, prevMom, nextMom, 'mom', momSpan)}
        </td>
        <td class="col-dad ${dadNoBorder}" onclick="openModal('${hStr}', 'dad')">
          ${renderBlock(rowData.dad, prevDad, nextDad, 'dad', dadSpan)}
        </td>
      `;
      tbody.appendChild(tr);
    }
  }

  // ブロックのHTML生成（アイコン化と結合判定）
  const taskIcons = { 
    "母乳": "🤱", "ミルク": "🍼", "離乳食": "🥣", "おむつ": "🚼", "お風呂_baby": "🛁", "お風呂_parent": "🛀",
    "寝る": "💤", "ごはん": "🍚", "自由時間": "☕",
    "送る": "🚲", "迎える": "🏃", "出勤": "🏢", "帰宅": "🏠", "仕事": "💼", "リモート": "💻"
  };
  
  function renderBlock(taskStr, prevStr, nextStr, role, span) {
    if (!taskStr) return "";

    let isFirst = taskStr !== prevStr;
    let isLast = taskStr !== nextStr;

    let contClass = "";
    if (!isFirst) contClass += " cont-top";
    if (!isLast) contClass += " cont-bottom";

    const babyTasksArr = ["母乳", "ミルク", "離乳食", "おむつ", "お風呂_baby"];
    let tasks = taskStr.split(',');

    // タスクごとに個別のブロックを生成（色はタスクごとに判定）
    let bgBlocksHtml = tasks.map(t => {
      let bgClass = role === 'mom' ? 'bg-mom' : 'bg-dad';
      if (babyTasksArr.includes(t)) bgClass = 'bg-baby';
      
      return `<div class="task-block ${bgClass} ${contClass}"></div>`;
    }).join('');

    let contentHtml = "";
    if (isFirst) {
      let innerHtml = tasks.map(t => {
        let icon = taskIcons[t] ? `<span class="icon-only">${taskIcons[t]}</span>` : '';
        let displayLabel = t === "お風呂_baby" || t === "お風呂_parent" ? "お風呂" : t;
        let text = `<span class="text-badge">${displayLabel}</span>`;
        return `
          <div style="flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center; gap: 2px; flex-wrap: wrap;">
            ${icon}${text}
          </div>
        `;
      }).join('');
      // 1枠の高さ36px × 連続する時間数 でコンテナ高さを設定し、その中で上下左右中央揃えにする
      contentHtml = `<div class="merged-text" style="height: ${span * 36}px;">${innerHtml}</div>`;
    }

    return `
      <div class="task-container ${contClass}">
        ${bgBlocksHtml}
        ${contentHtml}
      </div>
    `;
  }

  // ---- メモ制御ロジック ----
  const memoEl = document.getElementById('pattern-memo');
  let memoTimeout;
  memoEl.addEventListener('input', (e) => {
    if (!currentPatternId) return;
    clearTimeout(memoTimeout);
    let val = e.target.value;
    memoTimeout = setTimeout(() => {
      update(ref(db, `patterns/${currentPatternId}`), { memo: val });
    }, 1000);
  });
  memoEl.addEventListener('change', (e) => {
    if (!currentPatternId) return;
    clearTimeout(memoTimeout);
    update(ref(db, `patterns/${currentPatternId}`), { memo: e.target.value });
  });

  // ---- モーダル制御ロジック ----
  const taskGroups = {
    "👶 赤ちゃんのお世話": ["母乳", "ミルク", "離乳食", "おむつ", "お風呂_baby"],
    "🧑 自分たちの予定": ["寝る", "ごはん", "お風呂_parent", "自由時間", "送る", "迎える", "出勤", "帰宅", "仕事", "リモート"]
  };
  const taskModal = document.getElementById('task-modal');
  const modalBody = document.getElementById('modal-body-container');
  let currentEditHour = "";
  let currentEditRole = "";

  window.openModal = function(hour, role) {
    currentEditHour = hour;
    currentEditRole = role;
    let roleName = role === 'mom' ? 'ママ' : 'パパ';
    document.getElementById('modal-title').innerText = `${hour}:00 ${roleName}のタスク`;
    
    // 現在のタスクを配列で取得
    let currentTasks = (currentData[hour]?.[role] || "").split(',').filter(Boolean);
    let activeClass = role === 'mom' ? 'mom-active' : 'dad-active';

    modalBody.innerHTML = "";
    
    for (const [groupName, tasks] of Object.entries(taskGroups)) {
      let groupTitle = document.createElement('div');
      groupTitle.className = "group-title";
      groupTitle.innerText = groupName;
      modalBody.appendChild(groupTitle);
      
      let grid = document.createElement('div');
      grid.className = "btn-grid";
      
      tasks.forEach(task => {
        let btn = document.createElement('button');
        let isSelected = currentTasks.includes(task);
        btn.className = `task-btn ${isSelected ? 'active ' + activeClass : ''}`;
        
        let displayLabel = task === "お風呂_baby" || task === "お風呂_parent" ? "お風呂" : task;
        let displayText = taskIcons[task] ? `${taskIcons[task]} ${displayLabel}` : displayLabel;
        btn.innerHTML = displayText;
        
        btn.onclick = () => {
          if (isSelected) {
            currentTasks = currentTasks.filter(t => t !== task);
          } else {
            currentTasks.push(task);
          }
          updateTask(currentTasks.join(','));
          openModal(hour, role); 
        };
        grid.appendChild(btn);
      });
      modalBody.appendChild(grid);
    }
    
    taskModal.style.display = "flex";
  };

  window.updateTask = function(taskStr) {
    let updates = {};
    updates[currentEditRole] = taskStr;
    update(ref(db, `patterns/${currentPatternId}/schedule/${currentEditHour}`), updates);
  };

  window.clearTask = function() {
    updateTask("");
    closeModal();
  };
  window.closeModal = function() { taskModal.style.display = "none"; };

  // ---- 設定モーダル制御 ----
  const settingsModal = document.getElementById('settings-modal');
  const startSelect = document.getElementById('dark-start');
  const endSelect = document.getElementById('dark-end');

  // セレクトボックスの選択肢を0〜23で生成
  let optionsHtml = Array.from({length: 24}, (_, i) => `<option value="${i}">${i}:00</option>`).join('');
  startSelect.innerHTML = optionsHtml;
  endSelect.innerHTML = optionsHtml;

  window.openSettings = function() {
    startSelect.value = currentSettings.darkStart;
    endSelect.value = currentSettings.darkEnd;
    settingsModal.style.display = "flex";
  };
  window.saveSettings = function() {
    update(ref(db, 'settings'), {
      darkStart: parseInt(startSelect.value),
      darkEnd: parseInt(endSelect.value)
    });
    settingsModal.style.display = "none";
  };
</script>
</body>
</html>

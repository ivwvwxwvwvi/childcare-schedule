<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>育児タイムスケジュール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #f7faf9; color: #333; padding: 8px; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
  .app-container { background: #fff; width: 100%; max-width: 412px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); overflow: hidden; padding-bottom: 20px; }
  .header { background: #fff; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f0f0; }
  .header-left h1 { font-size: 16px; color: #444; font-weight: 700; margin-bottom: 4px; }
  .header-left p { font-size: 10px; color: #666; background: #f0f4f2; padding: 2px 6px; border-radius: 6px; display: inline-block;}
  .settings-btn { background: #455a64; color: #fff; border: none; padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { padding: 6px 0; font-size: 11px; color: #777; border-bottom: 1px solid #eee; background: #fafafa; font-weight: 700; }
  td { border-bottom: 1px solid #f2f2f2; border-right: 1px solid #fbfbfb; height: 36px; padding: 0; text-align: center; vertical-align: middle; font-size: 11px; cursor: pointer; }
  .col-time { width: 18%; font-weight: 700; color: #555; background: #fafafa; }
  .col-mom, .col-dad { width: 41%; }
  /* 暗室 */
  .dark-row td { background-color: #2c3e50; color: #a9b9c9; }
  .dark-row td.col-time { background-color: #263645; color: #95a5a6; }
  /* タスク */
  .task-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 2px; }
  .task-block { width: 96%; height: 100%; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 11px; font-weight: 700; gap: 2px; }
  .cont-top { border-top-left-radius: 0; border-top-right-radius: 0; margin-top: -4px; }
  .cont-bottom { border-bottom-left-radius: 0; border-bottom-right-radius: 0; margin-bottom: -4px; }
  /* カラー */
  .bg-mom { background-color: #ffe3e8; color: #c2185b; }
  .bg-dad { background-color: #e1f5fe; color: #0288d1; }
  .bg-baby { background-color: #f3e5f5; color: #7b1fa2; }
  .bg-sleep { background-color: #eceff1; color: #607d8b; }
  .dark-row .bg-baby { background-color: #4a148c; color: #e1bee7; }
  .icon-only { font-size: 14px; }
  /* モーダル */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: flex-end; z-index: 100; }
  .modal-content { background: #fff; width: 100%; max-width: 412px; border-radius: 16px 16px 0 0; padding: 20px; text-align: center; }
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .task-btn { padding: 12px 4px; border: 2px solid #eee; border-radius: 8px; font-size: 11px; font-weight: 700; background: #fff; cursor: pointer; }
  .task-btn.active.mom-active { background: #ffe3e8; border-color: #ffb3c6; color: #c2185b; }
  .task-btn.active.dad-active { background: #e1f5fe; border-color: #81d4fa; color: #0288d1; }
  .close-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #333; color: #fff; font-weight: 700; }
  .setting-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <div class="header-left"><h1>育児スケジュール</h1><p id="status-text">🔴 接続中...</p></div>
    <button class="settings-btn" onclick="openSettings()">🌙 暗室設定</button>
  </div>
  <table>
    <thead><tr><th class="col-time">時間</th><th class="col-mom">ママ</th><th class="col-dad">パパ</th></tr></thead>
    <tbody id="schedule-body"></tbody>
  </table>
</div>
<div class="modal-overlay" id="task-modal">
  <div class="modal-content">
    <div class="modal-title" id="modal-title" style="margin-bottom:15px; font-weight:700;">タスク選択</div>
    <div class="btn-grid" id="modal-btn-grid"></div>
    <button class="close-btn" onclick="closeModal()">閉じる</button>
  </div>
</div>
<div class="modal-overlay" id="settings-modal">
  <div class="modal-content">
    <div class="modal-title" style="margin-bottom:15px; font-weight:700;">🌙 暗室にする時間帯</div>
    <div class="setting-row"><select id="dark-start"></select><span>〜</span><select id="dark-end"></select></div>
    <button class="close-btn" onclick="saveSettings()">保存して閉じる</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB_LrMdc1wNheY3cgU1jocn9FwrMAFwpLw",
    authDomain: "childcare-schedule.firebaseapp.com",
    databaseURL: "https://childcare-schedule-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "childcare-schedule",
    storageBucket: "childcare-schedule.firebasestorage.app",
    messagingSenderId: "941657534679",
    appId: "1:941657534679:web:18c7fadb28320224a94092"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  let currentData = {}, currentSettings = { darkStart: 19, darkEnd: 6 };

  onValue(ref(db, '/'), (snapshot) => {
    let data = snapshot.val();
    if (!data || !data.schedule) {
      set(ref(db, 'schedule'), {}); set(ref(db, 'settings'), currentSettings); return;
    }
    currentData = data.schedule; currentSettings = data.settings || currentSettings;
    renderTable();
    document.getElementById('status-text').innerHTML = "🟢 同期済み";
  });

  function isDarkHour(h) {
    let s = currentSettings.darkStart, e = currentSettings.darkEnd;
    return s < e ? (h >= s && h < e) : (h >= s || h < e);
  }

  function renderTable() {
    const tbody = document.getElementById('schedule-body'); tbody.innerHTML = "";
    for (let h = 0; h < 24; h++) {
      let hStr = h.toString().padStart(2, '0'), row = currentData[hStr] || { mom: "", dad: "" };
      let tr = document.createElement('tr');
      if (isDarkHour(h)) tr.className = "dark-row";
      
      let prevM = h > 0 ? (currentData[(h-1).toString().padStart(2, '0')]?.mom || "") : "";
      let nextM = h < 23 ? (currentData[(h+1).toString().padStart(2, '0')]?.mom || "") : "";
      let prevD = h > 0 ? (currentData[(h-1).toString().padStart(2, '0')]?.dad || "") : "";
      let nextD = h < 23 ? (currentData[(h+1).toString().padStart(2, '0')]?.dad || "") : "";

      tr.innerHTML = `<td class="col-time">${hStr}:00</td>
        <td class="col-mom" onclick="openModal('${hStr}', 'mom')"><div class="task-container">${renderBlock(row.mom, prevM, nextM, 'mom')}</div></td>
        <td class="col-dad" onclick="openModal('${hStr}', 'dad')"><div class="task-container">${renderBlock(row.dad, prevD, nextD, 'dad')}</div></td>`;
      tbody.appendChild(tr);
    }
  }

  const icons = { "母乳": "🤱", "ミルク": "🍼", "離乳食": "🥣" };
  function renderBlock(taskStr, prev, next, role) {
    if (!taskStr) return "";
    let cont = (taskStr === prev ? " cont-top" : "") + (taskStr === next ? " cont-bottom" : "");
    let isBaby = /母乳|ミルク|離乳食/.test(taskStr);
    let bg = taskStr.includes('寝る') ? 'bg-sleep' : (isBaby ? 'bg-baby' : (role === 'mom' ? 'bg-mom' : 'bg-dad'));
    let content = taskStr.split(',').map(t => icons[t] ? `<span class="icon-only">${icons[t]}</span>` : `<span class="text-badge">${t}</span>`).join('');
    return `<div class="task-block ${bg} ${cont}">${content}</div>`;
  }

  const taskOptions = ["母乳", "ミルク", "離乳食", "おむつ", "朝食", "昼食", "夕食", "お風呂", "寝る"];
  let curH = "", curR = "";
  window.openModal = (h, r) => {
    curH = h; curR = r;
    let tasks = (currentData[h]?.[r] || "").split(',').filter(Boolean);
    let grid = document.getElementById('modal-btn-grid'); grid.innerHTML = "";
    taskOptions.forEach(t => {
      let btn = document.createElement('button');
      btn.className = `task-btn ${tasks.includes(t) ? 'active ' + (r === 'mom' ? 'mom-active' : 'dad-active') : ''}`;
      btn.innerHTML = icons[t] ? `${icons[t]} ${t}` : t;
      btn.onclick = () => {
        let newT = tasks.includes(t) ? tasks.filter(x => x !== t) : [...tasks, t];
        update(ref(db, `schedule/${h}`), {[r]: newT.join(',')});
      };
      grid.appendChild(btn);
    });
    document.getElementById('task-modal').style.display = "flex";
  };
  window.closeModal = () => document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = "none");
  window.openSettings = () => {
    ['dark-start', 'dark-end'].forEach(id => {
      document.getElementById(id).innerHTML = Array.from({length:24}, (_,i) => `<option value="${i}">${i}:00</option>`).join('');
    });
    document.getElementById('dark-start').value = currentSettings.darkStart;
    document.getElementById('dark-end').value = currentSettings.darkEnd;
    document.getElementById('settings-modal').style.display = "flex";
  };
  window.saveSettings = () => {
    update(ref(db, 'settings'), { darkStart: parseInt(document.getElementById('dark-start').value), darkEnd: parseInt(document.getElementById('dark-end').value) });
    closeModal();
  };
</script>
</body>
</html>
